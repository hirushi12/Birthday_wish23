<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal  Birthday  Wishes 👑</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:'Poppins',sans-serif;
    color:gold;
}

/* 🌌 Galaxy Background */
.galaxy{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at center,#111 0%,#000 70%);
    z-index:-3;
}

.palace{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle at top,#1a2a6c,#000);
    z-index:-2;
}

/* 🎥 Netflix Countdown */
.countdown{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:120px;
    font-weight:bold;
    color:red;
    z-index:1000;
}

/* 🎞 Cinematic Intro */
.introText{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Cinzel',serif;
    font-size:60px;
    letter-spacing:5px;
    background:black;
    animation:zoomFade 4s forwards;
    animation-delay:3s;
    z-index:900;
}

@keyframes zoomFade{
    0%{transform:scale(0.5);opacity:0;}
    50%{transform:scale(1.1);opacity:1;}
    100%{opacity:0;visibility:hidden;}
}

/* Royal Card */
.card{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.6);
    padding:60px;
    border-radius:30px;
    backdrop-filter:blur(15px);
    text-align:center;
    box-shadow:0 0 50px gold;
}

button{
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,gold,orange);
    font-weight:700;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    box-shadow:0 0 20px gold;
    transform:scale(1.1);
}

.hidden{display:none;}

h1{
    font-family:'Cinzel',serif;
    font-size:55px;
    text-shadow:0 0 20px gold;
}

/* 🎂 Cake */
.layer{
    width:220px;
    height:50px;
    background:linear-gradient(to right,#ffcc33,#ff9900);
    margin:5px auto;
    border-radius:20px;
}
.candle{
    width:10px;
    height:40px;
    background:white;
    margin:0 auto;
    position:relative;
}
.flame{
    width:15px;
    height:15px;
    background:gold;
    border-radius:50%;
    position:absolute;
    top:-15px;
    left:-2.5px;
    animation:flicker 0.2s infinite alternate;
}
@keyframes flicker{
    from{transform:scale(1);}
    to{transform:scale(1.3);}
}

/* 💎 Diamond Sparkle */
.sparkle{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    transform:rotate(45deg);
    animation:spark 3s linear infinite;
}
@keyframes spark{
    from{transform:translateY(0) rotate(45deg);opacity:1;}
    to{transform:translateY(-300px) rotate(45deg);opacity:0;}
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}
/* 🎈 Balloons */
.balloon{
    position:fixed;
    bottom:-120px;
    width:60px;
    height:80px;
    border-radius:50%;
    animation:floatUp linear infinite;
}

.balloon:after{
    content:"";
    position:absolute;
    width:2px;
    height:60px;
    background:white;
    left:50%;
    top:80px;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* 🎊 Confetti */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    background:red;
    top:-10px;
    animation:confettiFall linear infinite;
}

@keyframes confettiFall{
    from{
        transform:translateY(0) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}

/* ✨ Card Glow Upgrade */
.card{
    animation:cardGlow 3s infinite alternate;
}

@keyframes cardGlow{
    from{box-shadow:0 0 30px gold;}
    to{box-shadow:0 0 70px orange;}
}
</style>
</head>
<body>

<div class="galaxy"></div>
<div class="palace"></div>

<div class="countdown" id="countdown">3</div>
<div class="introText">👑 A Royal Birthday Celebration 👑</div>

<canvas id="fireworks"></canvas>

<audio id="music" loop>
<source src="Happy_birthday_english(chosic.com).mp3" type="audio/mpeg">
</audio>

<div class="card hidden" id="startSection">
    <h2>The Royal Moment Awaits ✨</h2>
    <button onclick="startCelebration()">Surprise ! ! Enjoy Now 🎆</button>
</div>

<div class="card hidden" id="celebrationSection">
    <h1 id="birthdayText"></h1>

    <div class="cake">
        <div class="layer"></div>
        <div class="layer"></div>
        <div class="layer"></div>
        <div class="candle"><div class="flame"></div></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
